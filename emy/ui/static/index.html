<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emy Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <h1 class="title">Emy</h1>
                <span class="status-indicator" id="statusDot" title="API Status"></span>
                <span class="status-text" id="statusText">Connecting...</span>
            </div>
            <div class="header-right">
                <span class="agent-badge" id="agentCount">0 agents</span>
            </div>
        </header>

        <!-- Main Query Section -->
        <section class="query-section">
            <label for="queryInput" class="query-label">What do you need?</label>
            <textarea
                id="queryInput"
                class="query-input"
                placeholder="e.g. 'Check my trading health' or 'What's in my knowledge base?'"
                rows="4"
            ></textarea>

            <div class="control-row">
                <div class="workflow-selector">
                    <label for="workflowSelect">Agent:</label>
                    <select id="workflowSelect" class="workflow-dropdown"></select>
                </div>
                <label class="compare-toggle">
                    <input type="checkbox" id="compareMode"> Compare agents
                </label>
                <button id="submitBtn" class="submit-btn">Send</button>
            </div>

            <div id="compareAgentRow" class="control-row" style="display:none">
                <div class="workflow-selector">
                    <label for="workflowSelect2">Compare with:</label>
                    <select id="workflowSelect2" class="workflow-dropdown"></select>
                </div>
            </div>
        </section>

        <!-- Result Section -->
        <section class="result-section">
            <div class="result-header">
                <div>
                    <h2>Result</h2>
                    <span class="result-time" id="resultTime"></span>
                </div>
                <div class="result-actions" id="resultActions" style="display:none">
                    <button class="export-btn" id="exportBtn" title="Download as JSON">⬇ Export</button>
                    <button class="copy-btn" id="copyBtn" title="Copy to clipboard">⎘ Copy</button>
                </div>
            </div>
            <div class="result-content" id="resultContent">
                <p class="placeholder">Results will appear here</p>
            </div>
        </section>

        <!-- Comparison Section -->
        <section class="comparison-section" id="comparisonSection" style="display:none">
            <h2>Comparison</h2>
            <div class="comparison-grid">
                <div class="comparison-panel">
                    <div class="comparison-header"><span id="compareLabel1">Agent 1</span></div>
                    <div class="comparison-content" id="compareContent1"></div>
                </div>
                <div class="comparison-panel">
                    <div class="comparison-header"><span id="compareLabel2">Agent 2</span></div>
                    <div class="comparison-content" id="compareContent2"></div>
                </div>
            </div>
        </section>

        <!-- Loading Spinner -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <p>Executing workflow...</p>
        </div>

        <!-- Recent Queries Section -->
        <section class="history-section">
            <h2>Recent Queries</h2>
            <div class="history-list" id="historyList">
                <p class="placeholder">No queries yet</p>
            </div>
        </section>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
