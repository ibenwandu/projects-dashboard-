services:
  # ============================================================================
  # EMY PHASE 1A - Gateway & UI (existing)
  # ============================================================================
  - type: web
    name: emy-phase1a
    env: python
    plan: standard
    buildCommand: pip install -r emy/requirements.txt
    startCommand: python -m emy.gateway.service
    envVars:
      - key: GATEWAY_PORT
        value: 8000
      - key: GATEWAY_HOST
        value: 0.0.0.0
      - key: ENV
        value: production
      - key: BRAIN_SERVICE_URL
        value: https://emy-brain.onrender.com
      - key: ANTHROPIC_API_KEY
        scope: secret
      - key: LOG_LEVEL
        value: INFO
    disk:
      name: emy-data
      mountPath: /data
      sizeGB: 1

  # ============================================================================
  # EMY BRAIN SERVICE (NEW - Phase 3 Week 3)
  # ============================================================================
  - type: web
    name: emy-brain
    env: python
    plan: standard
    buildCommand: pip install -r emy/requirements.txt
    startCommand: python -m emy.brain.service
    envVars:
      - key: BRAIN_HOST
        value: 0.0.0.0
      - key: BRAIN_PORT
        value: 8001
      - key: ENV
        value: production
      - key: BRAIN_DB_PATH
        value: /data/emy_brain.db
      - key: QUEUE_BATCH_SIZE
        value: "10"
      - key: QUEUE_POLL_INTERVAL
        value: "5"
      - key: WS_HEARTBEAT_INTERVAL
        value: "30"
      - key: RATE_LIMIT_REQUESTS
        value: "100"
      - key: RATE_LIMIT_WINDOW
        value: "60"
      - key: LOG_LEVEL
        value: INFO
      - key: SENTRY_ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: "https://emy-phase1a.onrender.com"
      - key: AGENT_TIMEOUT
        value: "300"
      - key: LANGGRAPH_DEBUG
        value: "false"
      - key: ANTHROPIC_API_KEY
        scope: secret
      - key: EMY_DAILY_BUDGET_USD
        value: "10.00"
      - key: EMY_LOG_LEVEL
        value: INFO
      - key: EMY_HAIKU_MODEL
        value: claude-haiku-4-5-20251001
      - key: EMY_SONNET_MODEL
        value: claude-sonnet-4-6
      - key: EMY_OPUS_MODEL
        value: claude-opus-4-6
      - key: REDIS_URL
        scope: secret
      - key: DATABASE_URL
        scope: secret
      - key: OANDA_ACCESS_TOKEN
        scope: secret
      - key: OANDA_ACCOUNT_ID
        scope: secret
      - key: OANDA_ENV
        value: practice
    disk:
      name: emy-brain-data
      mountPath: /data
      sizeGB: 2

  # ============================================================================
  # EMY SCHEDULER - Celery Beat + Worker (Email Polling + Monitoring Tasks)
  # ============================================================================
  - type: background
    name: emy-scheduler
    env: python
    plan: standard
    buildCommand: pip install -r emy/requirements.txt
    startCommand: sh -c "celery -A emy.config.celery_config beat --loglevel=info &" && wait
    envVars:
      - key: REDIS_URL
        scope: secret
      - key: DATABASE_URL
        scope: secret
      - key: ANTHROPIC_API_KEY
        scope: secret
      - key: GMAIL_CREDENTIALS_JSON
        scope: secret
      - key: OANDA_ACCESS_TOKEN
        scope: secret
      - key: OANDA_ACCOUNT_ID
        scope: secret
      - key: OANDA_ENV
        value: practice
    autoDeploy: true

  # ============================================================================
  # EMY WORKER - Task Executor (Email Polling + Monitoring Tasks)
  # ============================================================================
  - type: background
    name: emy-worker
    env: python
    plan: standard
    numInstances: 2
    buildCommand: pip install -r emy/requirements.txt
    startCommand: celery -A emy.config.celery_config worker --loglevel=info --concurrency=4
    envVars:
      - key: REDIS_URL
        scope: secret
      - key: DATABASE_URL
        scope: secret
      - key: ANTHROPIC_API_KEY
        scope: secret
      - key: GMAIL_CREDENTIALS_JSON
        scope: secret
      - key: OANDA_ACCESS_TOKEN
        scope: secret
      - key: OANDA_ACCOUNT_ID
        scope: secret
      - key: OANDA_ENV
        value: practice
    autoDeploy: true

databases:
  - name: emy-db
    plan: standard
  - name: emy-redis
    engine: redis
    plan: standard
