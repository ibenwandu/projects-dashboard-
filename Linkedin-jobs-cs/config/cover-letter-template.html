<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cover Letter</title>
  <style>
    @page { size: letter; margin: 0.75in; }
    * { box-sizing: border-box; }
    body {
      font-family: "Georgia", "Times New Roman", serif;
      font-size: 11pt;
      line-height: 1.5;
      color: #1a1a1a;
      max-width: 8.5in;
      margin: 0 auto;
      padding: 0;
    }
    .letter-content {
      max-width: 6.5in;
      margin: 0 auto;
    }
    /* Top-right block: sender + date in one wrapper, all text left-aligned */
    .letter-content > .letter-header-right {
      margin-left: auto;
      width: fit-content;
      text-align: left;
      margin-bottom: 0.5em;
    }
    .letter-header-right > *:first-child {
      margin: 0 0 0.25em 0;
      font-size: 10.5pt;
      line-height: 1.4;
    }
    .letter-header-right > pre:first-child {
      font-family: inherit;
      font-size: 10.5pt;
      white-space: pre-wrap;
      background: transparent;
      border: none;
      padding: 0;
    }
    .letter-header-right > *:nth-child(2) {
      margin: 0 0 1.25em 0;
      font-size: 11pt;
    }
    /* Recipient block (first elements after header): left-aligned */
    .letter-content > *:nth-child(2),
    .letter-content > *:nth-child(3),
    .letter-content > *:nth-child(4),
    .letter-content > *:nth-child(5) {
      text-align: left;
    }
    .letter-content p {
      margin: 0 0 0.75em 0;
      text-align: justify;
      text-indent: 0;
    }
    .letter-content p + p {
      margin-top: 0.5em;
    }
    /* Salutation */
    .letter-content .salutation {
      margin: 1em 0 0.5em 0;
    }
    /* Closing and signature */
    .letter-content .closing {
      margin: 1.5em 0 0.25em 0;
    }
    .letter-content .signature {
      margin: 2.5em 0 0 0;
      font-size: 11pt;
      line-height: 1.3;
    }
    .letter-content strong { font-weight: bold; }
    .letter-content em { font-style: italic; }
    .letter-content a { color: #1a1a1a; text-decoration: none; }
    /* Headers if AI uses h2/h3 for sections */
    .letter-content h1, .letter-content h2, .letter-content h3 {
      font-size: 11pt;
      font-weight: bold;
      margin: 0.5em 0 0.25em 0;
    }
  </style>
</head>
<body>
  <div class="letter-content">
    {{CONTENT}}
  </div>
</body>
</html>
