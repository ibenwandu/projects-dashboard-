<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume</title>
  <style>
    @page { size: letter; margin: 0.6in; }
    * { box-sizing: border-box; }
    body {
      font-family: "Calibri", "Segoe UI", Arial, sans-serif;
      font-size: 11pt;
      line-height: 1.35;
      color: #1a1a1a;
      max-width: 8.5in;
      margin: 0 auto;
      padding: 0;
    }
    .resume-content h1 {
      text-align: center;
      font-size: 22pt;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      margin: 0 0 6px 0;
      color: #4a7ebb;
    }
    .resume-content h2 {
      font-size: 12pt;
      font-weight: bold;
      text-decoration: underline;
      margin: 14px 0 8px 0;
      padding-bottom: 2px;
    }
    .resume-content h3 {
      font-size: 11pt;
      font-weight: bold;
      margin: 10px 0 2px 0;
    }
    .resume-content p { margin: 4px 0; }
    .resume-content ul {
      margin: 6px 0 10px 0;
      padding-left: 20px;
      list-style-type: disc;
    }
    .resume-content li { margin: 3px 0; }
    .resume-content hr {
      border: none;
      border-top: 1px solid #333;
      margin: 12px 0;
    }
    .resume-content strong { font-weight: bold; }
    .resume-content em { font-style: italic; }
    .resume-content a { color: #1a1a1a; text-decoration: none; }
    .resume-content .contact-block {
      text-align: center;
      font-size: 10.5pt;
      margin-bottom: 4px;
    }
    .resume-content .contact-block ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0 8px;
    }
    .resume-content .contact-block li { display: inline; }
    .resume-content .contact-block li:not(:last-child)::after {
      content: " | ";
      margin-left: 8px;
      font-weight: normal;
    }
  </style>
</head>
<body>
  <div class="resume-content">
    {{CONTENT}}
  </div>
</body>
</html>
