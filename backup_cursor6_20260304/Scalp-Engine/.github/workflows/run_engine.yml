name: Run Scalp-Engine

on:
  workflow_dispatch:  # Manual trigger only
  # schedule disabled - engine runs on Render from Trade-Alerts; scheduled runs were failing and causing cancellation emails
  # schedule:
  #   - cron: '*/5 * * * *'

jobs:
  run-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Run for up to 1 hour per execution
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run Scalp-Engine
      env:
        OANDA_ACCESS_TOKEN: ${{ secrets.OANDA_ACCESS_TOKEN }}
        OANDA_ACCOUNT_ID: ${{ secrets.OANDA_ACCOUNT_ID }}
        OANDA_ENV: ${{ secrets.OANDA_ENV || 'practice' }}
        MARKET_STATE_FILE_PATH: ${{ secrets.MARKET_STATE_FILE_PATH || '' }}
      run: |
        echo "🚀 Starting Scalp-Engine..."
        timeout 3600 python scalp_engine.py || true
        echo "✅ Scalp-Engine execution completed"
