[pytest]
# Pytest configuration for Emy project

# Markers for categorizing tests
markers =
    integration: marks tests as integration tests (use real browser, OANDA API, etc)
    unit: marks tests as unit tests (mocked dependencies)

# Async support
asyncio_mode = auto

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    -m "not integration"
